<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrikeR — Strike Point Lightning Protection</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/SP Bolt 400x400.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StrikeR">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
<div class="home-container">
    <div class="home-logo">
        <img src="assets/SP Bolt 400x400.png" alt="Strike Point">
    </div>
    <h1 class="home-title">StrikeR</h1>
    <p class="home-subtitle">Lightning Protection Reporting Tool</p>

    <div class="home-cards">
        <div class="home-card" onclick="location.href='reports.html'">
            <div class="home-card-icon">📋</div>
            <div class="home-card-title">Reports</div>
            <div class="home-card-desc">Create Test &amp; Inspection, Survey, and Remedial Reports</div>
        </div>
        <div class="home-card" onclick="location.href='tools.html'">
            <div class="home-card-icon">🔧</div>
            <div class="home-card-title">Tools</div>
            <div class="home-card-desc">Separation Distance Calculator and engineering tools</div>
        </div>
    </div>
</div>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.log('SW failed:', e));
    }
</script>
</body>
</html>
